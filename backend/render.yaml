services:
  - type: web
    name: ai-trading-backend
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn main:socket_app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: DATABASE_URL
        sync: false # You will paste your Supabase/Neon URL here
      - key: GEMINI_API_KEY
        sync: false # You will paste your Gemini API Key here
